<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Silhouette Studio — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--rose:#D4908F;--rose-lt:#E8B4B3;--rose-pl:#F5D5D4;--rose-fd:#FDF0F0;--rose-dk:#B07271;--rose-deep:#9A5B5A;--blush:#F2C4C3;--mauve:#C9A0A0;--cream:#FDF8F6;--sand:#F3EDE7;--sand-m:#E8DDD4;--sand-d:#D4C8BC;--char:#2C2927;--char-s:#4A4543;--warm:#7A706A;--light:#B0A8A2;--grn:#6BAF7B;--grn-pl:#EBF5ED;--grn-dk:#4A8A58;--amb:#D4A04F;--amb-pl:#FFF6E8;--amb-dk:#A87B30;--red:#D45F5F;--red-pl:#FDECEC;--blue:#5B8EC9;--blue-pl:#EAF1FA;--purp:#9B7EC8;--purp-pl:#F0EBF8;--sb-bg:#2C2321;--sb-hov:#3D322F;--card:#FFF;--card-b:#F0E6E0;--fd:'Cormorant Garamond',Georgia,serif;--fb:'Outfit','Helvetica Neue',sans-serif;--r:14px;--rs:10px;}
*{box-sizing:border-box;margin:0;padding:0}html,body{width:100%;max-width:100%;overflow-x:hidden}body{font-family:var(--fb);background:var(--cream);color:var(--char);-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh;margin:0;padding:0}button{font-family:inherit;cursor:pointer;border:none;background:none}input,select,textarea{font-family:inherit}::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--sand-d);border-radius:10px}::-webkit-scrollbar-track{background:transparent}
#loginScreen{position:fixed;inset:0;background:var(--cream);z-index:999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--card);border:1px solid var(--card-b);border-radius:var(--r);padding:40px;width:100%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.08)}.login-box .logo{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rose-deep));display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--fd);font-size:28px;font-weight:700;margin:0 auto 16px;box-shadow:0 6px 20px rgba(212,144,143,.4)}.login-box h2{font-family:var(--fd);font-size:24px;margin-bottom:4px}.login-box p{font-size:12px;color:var(--warm);margin-bottom:24px}.login-box .err{font-size:11px;color:var(--red);margin-bottom:10px}
.L{display:grid;grid-template-areas:"sb tb tb" "sb mn rp";grid-template-columns:220px 1fr 290px;grid-template-rows:56px 1fr;height:100vh;width:100vw;max-width:100%;overflow:hidden}@media(max-width:1200px){.L{grid-template-columns:64px 1fr 260px}}@media(max-width:900px){.L{grid-template-areas:"tb" "mn";grid-template-columns:1fr;grid-template-rows:56px 1fr}}
.sb{grid-area:sb;background:var(--sb-bg);padding:20px 14px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}@media(max-width:900px){.sb{display:none}}.sb-br{display:flex;align-items:center;gap:10px;padding:4px 8px;margin-bottom:22px}.sb-lg{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rose-deep));display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--fd);font-size:18px;font-weight:700;box-shadow:0 4px 14px rgba(212,144,143,.4);flex-shrink:0}.sb-nm{color:#fff;font-family:var(--fd);font-size:16px;font-weight:600;line-height:1.15}.sb-nm small{display:block;font-family:var(--fb);font-size:9.5px;color:var(--sand-d);font-weight:400;letter-spacing:1.2px;text-transform:uppercase;margin-top:2px}@media(max-width:1200px){.sb-nm{display:none}}.sb-lb{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.8px;font-weight:600;padding:14px 10px 6px}.sb-it{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);color:rgba(255,255,255,.5);font-size:13px;font-weight:500;transition:all .15s;letter-spacing:.2px}.sb-it:hover{background:var(--sb-hov);color:rgba(255,255,255,.85)}.sb-it.on{background:linear-gradient(135deg,var(--rose),var(--rose-dk));color:#fff;box-shadow:0 4px 12px rgba(212,144,143,.3)}.sb-it svg{flex-shrink:0;width:18px;height:18px}.sb-it span:not(.sb-badge){white-space:nowrap}@media(max-width:1200px){.sb-it{justify-content:center;padding:10px}.sb-it span:not(.sb-badge){display:none}.sb-badge{display:none}}.sb-badge{margin-left:auto;font-size:9px;font-weight:700;background:var(--amb);color:#fff;padding:2px 6px;border-radius:10px}.sb-sp{flex:1}.sb-ft{padding:10px;text-align:center}.sb-ft p{font-size:9px;color:rgba(255,255,255,.2)}
.tb{grid-area:tb;background:var(--card);border-bottom:1px solid var(--card-b);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:12px;min-width:0}.tb-l{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--warm);min-width:0}.tb-l .cr{color:var(--char);font-weight:600}.tb-r{display:flex;align-items:center;gap:12px;flex-shrink:0}.tb-ic{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--sand);color:var(--warm);font-size:14px;transition:all .15s;cursor:pointer;flex-shrink:0}.tb-ic:hover{background:var(--rose-fd);color:var(--rose)}.tb-role{font-size:9px;padding:3px 8px;border-radius:6px;font-weight:600;letter-spacing:.5px}.tb-role.admin{background:var(--rose-fd);color:var(--rose-dk)}.tb-role.user{background:var(--blue-pl);color:var(--blue)}.tb-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--blush));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;font-family:var(--fd);flex-shrink:0}
.mn{grid-area:mn;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px;min-width:0}.mhdr{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}.mtit{font-family:var(--fd);font-size:28px;font-weight:700;letter-spacing:-.3px}.mhr{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.tpills{display:flex;background:var(--sand);border-radius:var(--rs);padding:3px;gap:2px}.tp{padding:7px 18px;border-radius:8px;font-size:12px;font-weight:600;color:var(--warm);transition:all .15s;letter-spacing:.3px}.tp.on{background:var(--card);color:var(--rose);box-shadow:0 1px 4px rgba(0,0,0,.06)}.err-b{background:#FFF8EE;border:1px solid rgba(212,160,79,.25);border-radius:10px;padding:10px 16px;font-size:12px;color:var(--amb-dk);display:flex;align-items:center;justify-content:space-between;gap:8px}.err-x{cursor:pointer;font-size:14px;color:var(--amb-dk);opacity:.6;padding:4px}.err-x:hover{opacity:1}
.cd{background:var(--card);border:1px solid var(--card-b);border-radius:var(--r);overflow:hidden}.cd-h{padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}.cd-t{font-family:var(--fd);font-size:18px;font-weight:700;color:var(--char)}.cd-b{padding:0 20px 20px}
.btn{padding:9px 18px;border-radius:var(--rs);font-size:12px;font-weight:600;letter-spacing:.3px;transition:all .15s;display:inline-flex;align-items:center;gap:6px}.btn.pri{background:linear-gradient(135deg,var(--rose),var(--rose-dk));color:#fff;box-shadow:0 2px 8px rgba(212,144,143,.25)}.btn.pri:hover{box-shadow:0 4px 14px rgba(212,144,143,.35)}.btn.sec{background:var(--sand);color:var(--char-s);border:1px solid var(--sand-m)}.btn.sm{padding:6px 12px;font-size:11px}.btn.dn{background:var(--red-pl);color:var(--red)}.badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.3px}.badge.am{background:var(--amb-pl);color:var(--amb-dk)}
/* OV */
.ov-week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.ov-daycard{background:var(--card);border:1px solid var(--card-b);border-radius:var(--rs);padding:12px;min-height:90px;cursor:pointer;transition:all .15s}.ov-daycard:hover{border-color:var(--rose-lt);box-shadow:0 2px 12px rgba(212,144,143,.1)}.ov-daycard.today{border-color:var(--rose);box-shadow:0 0 0 2px var(--rose-pl)}.ov-dh{font-size:10px;color:var(--warm);text-transform:uppercase;letter-spacing:.8px;font-weight:600}.ov-dd{font-family:var(--fd);font-size:22px;font-weight:700;margin:2px 0 6px}.ov-dc{font-size:10px;color:var(--warm)}.ov-dc b{color:var(--char);font-weight:700}
.ov-stat{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--card);border:1px solid var(--card-b);border-radius:var(--rs)}.ov-stat-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}.ov-stat-v{font-family:var(--fb);font-size:28px;font-weight:700;line-height:1}.ov-stat-l{font-size:10px;color:var(--warm);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.ov-grid{display:grid;grid-template-columns:minmax(280px,1fr) 1fr;gap:14px}@media(max-width:900px){.ov-grid{grid-template-columns:1fr}}
/* TABS for overview sub-sections */
.ov-tabs{display:flex;gap:0;border-bottom:2px solid var(--sand);margin-bottom:16px}.ov-tab{padding:10px 18px;font-size:12px;font-weight:600;color:var(--warm);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}.ov-tab:hover{color:var(--char)}.ov-tab.on{color:var(--rose);border-color:var(--rose)}
/* CRM PIPELINE */
.crm-pipe{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;min-height:400px;scroll-behavior:smooth}.crm-col{flex:0 0 240px;background:var(--sand);border-radius:var(--r);display:flex;flex-direction:column;max-height:500px}.crm-col-h{padding:12px 14px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;display:flex;justify-content:space-between;align-items:center;border-radius:var(--r) var(--r) 0 0}.crm-col-h .cnt{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;background:rgba(255,255,255,.5)}.crm-col-b{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:60px}
.crm-card{background:var(--card);border:1px solid var(--card-b);border-radius:var(--rs);padding:10px 12px;cursor:grab;transition:all .12s;font-size:11px}.crm-card:active{cursor:grabbing;opacity:.7}.crm-card:hover{border-color:var(--rose-lt);box-shadow:0 2px 8px rgba(0,0,0,.05)}.crm-card.drag-over{border-color:var(--rose);background:var(--rose-fd)}.crm-card .cn{font-weight:600;font-size:12px;margin-bottom:3px}.crm-card .cm{font-size:10px;color:var(--warm)}
.crm-col-b.drag-over{background:var(--rose-fd);border:2px dashed var(--rose-lt)}
/* REMINDERS */
.rem-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--sand);font-size:12px;transition:background .1s}.rem-row:hover{background:var(--rose-fd)}.rem-row:last-child{border-bottom:none}
.rem-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--sand-d);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:10px;transition:all .15s}.rem-check:hover{border-color:var(--rose)}.rem-check.done{background:var(--grn);border-color:var(--grn);color:#fff}
.rem-badge{font-size:8px;padding:2px 6px;border-radius:4px;font-weight:700;letter-spacing:.3px;flex-shrink:0}.rem-badge.day{background:var(--blue-pl);color:var(--blue)}.rem-badge.hour{background:var(--purp-pl);color:var(--purp)}
/* SCHEDULE */
.sch-monthnav{display:flex;align-items:center;gap:8px}.sch-monthnav .arr{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--sand);color:var(--warm);font-size:14px;cursor:pointer;transition:all .15s}.sch-monthnav .arr:hover{background:var(--rose-fd);color:var(--rose)}.sch-monthnav .lbl{font-family:var(--fd);font-size:18px;font-weight:700;min-width:160px;text-align:center}.sch-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}.sch-dow{font-size:9px;color:var(--light);text-transform:uppercase;letter-spacing:1px;font-weight:600;text-align:center;padding:6px 0}.sch-day{text-align:center;padding:8px 4px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .12s;font-weight:500;position:relative}.sch-day:hover{background:var(--rose-fd)}.sch-day.sel{background:linear-gradient(135deg,var(--rose),var(--rose-dk));color:#fff;font-weight:700;box-shadow:0 2px 8px rgba(212,144,143,.3)}.sch-day.today{font-weight:700;color:var(--rose-dk)}.sch-day.today::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--rose)}.sch-day.other{color:var(--light);opacity:.4}.sch-day.has-data::before{content:'';position:absolute;top:4px;right:4px;width:5px;height:5px;border-radius:50%;background:var(--grn)}
.sg{width:100%;table-layout:fixed;border-collapse:separate;border-spacing:0;border:1px solid var(--card-b);border-radius:var(--r);overflow:hidden;background:var(--sand-m)}.sg th{background:var(--sand);padding:8px 4px;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--warm);font-weight:600;text-align:center;border-bottom:1px solid var(--card-b);position:sticky;top:0;z-index:2}.sg th.room-h{background:var(--rose-fd);color:var(--rose-dk);font-size:11px;font-family:var(--fd);font-weight:700;letter-spacing:0;text-transform:none;border-left:2px solid var(--card-b)}.sg th.time-h{width:60px}.sg th.inst-h{width:50px;font-size:8px}.sg td{background:var(--card);padding:4px;border-bottom:1px solid var(--sand);border-left:1px solid var(--sand);vertical-align:top;min-height:40px;height:44px}.sg td.time-col{background:var(--sand);text-align:center;font-size:11px;font-weight:600;color:var(--warm);border-left:none;width:60px;vertical-align:middle}.sg td.inst-col{background:var(--cream);text-align:center;width:50px;vertical-align:middle;cursor:pointer}.sg td.inst-col:hover{background:var(--rose-fd)}.sg td.slot-col{position:relative}.sg td.slot-col.drag-over{background:var(--rose-fd);box-shadow:inset 0 0 0 2px var(--rose)}.sg td.room-sep{border-left:2px solid var(--card-b)}
.inst-pill{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;font-size:12px;font-weight:700;color:#fff;cursor:pointer;transition:all .12s;overflow:hidden;flex-shrink:0;position:relative}.inst-pill:hover{transform:scale(1.1)}.inst-pill img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%}
.chip{display:flex;align-items:center;gap:3px;background:var(--sand);border:1px solid var(--sand-m);border-radius:6px;padding:2px 5px;font-size:9.5px;font-weight:500;cursor:grab;transition:all .12s;white-space:nowrap;max-width:100%;overflow:hidden}.chip:active{cursor:grabbing;opacity:.7}.chip:hover{border-color:var(--rose-lt);background:var(--rose-fd)}.chip.isnew{background:var(--amb-pl);border-color:rgba(212,160,79,.3)}.chip.att-came{background:var(--grn-pl);border-color:rgba(107,175,123,.4)}.chip.att-noshow{background:var(--red-pl);border-color:rgba(212,95,95,.3);opacity:.65;text-decoration:line-through}.chip.att-resched{background:var(--amb-pl);border-color:rgba(212,160,79,.35)}.chip .pd{width:5px;height:5px;border-radius:50%;flex-shrink:0}.chip .x{font-size:8px;color:var(--light);cursor:pointer;margin-left:1px;font-weight:700}.chip .x:hover{color:var(--red)}.chip .ss{font-size:8px;color:var(--warm);font-weight:600}
.att-bar{display:inline-flex;gap:1px;margin-left:auto;flex-shrink:0}.ab{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;cursor:pointer;border:1px solid transparent;background:var(--sand);transition:all .1s}.ab:hover{transform:scale(1.2)}.ab.c{background:var(--grn-pl);color:var(--grn-dk);border-color:var(--grn)}.ab.c.on{background:var(--grn);color:#fff}.ab.n{background:var(--red-pl);color:var(--red);border-color:var(--red)}.ab.n.on{background:var(--red);color:#fff}.ab.r{background:var(--amb-pl);color:var(--amb-dk);border-color:var(--amb)}.ab.r.on{background:var(--amb);color:#fff}
.sch-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:10px;color:var(--warm);align-items:center}.sch-legend i{width:10px;height:10px;border-radius:50%;display:inline-block;vertical-align:middle;margin-right:3px}
/* CLIENT DB */
.cdb-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.cdb-search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--card-b);border-radius:var(--rs);padding:10px 14px}.cdb-search input{border:none;outline:none;background:none;font-size:13px;color:var(--char);width:100%}.cdb-search input::placeholder{color:var(--light)}.cdb-list{max-height:520px;overflow-y:auto}.cdb-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--sand);transition:background .1s}.cdb-row:hover{background:var(--rose-fd)}.cdb-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}.cdb-info{flex:1;min-width:0}.cdb-name{font-size:13px;font-weight:600;color:var(--char)}.cdb-meta{font-size:10px;color:var(--warm);display:flex;gap:8px;margin-top:2px;flex-wrap:wrap}.cdb-acts{display:flex;gap:5px;flex-shrink:0}.cdb-act{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:all .15s}.cdb-act.edit{background:var(--sand);color:var(--warm)}.cdb-act.edit:hover{background:var(--rose-fd);color:var(--rose)}.cdb-act.del{background:var(--sand);color:var(--light)}.cdb-act.del:hover{background:var(--red-pl);color:var(--red)}.cdb-count{font-size:11px;color:var(--light);padding:8px 14px}
/* INSTRUCTOR */
.inst-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}@media(max-width:800px){.inst-grid{grid-template-columns:repeat(2,1fr)}}.inst-card{background:var(--card);border:1px solid var(--card-b);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;transition:all .15s}.inst-card:hover{border-color:var(--rose-lt);box-shadow:0 4px 16px rgba(212,144,143,.12)}.inst-card.sel{border-color:var(--rose);box-shadow:0 0 0 2px var(--rose-pl)}.inst-ava{width:65px;height:65px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;position:relative;flex-shrink:0;font-weight:700;color:#fff;margin:0 auto 10px}.inst-ava img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%}.inst-name{font-family:var(--fd);font-size:16px;font-weight:700}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(44,41,39,.5);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}.modal-bg.open{opacity:1;pointer-events:all}.modal{background:var(--card);border-radius:var(--r);width:100%;max-width:460px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);transform:translateY(10px);transition:transform .2s}.modal-bg.open .modal{transform:translateY(0)}.modal-h{padding:20px 24px 16px;border-bottom:1px solid var(--sand);display:flex;justify-content:space-between;align-items:center}.modal-h h3{font-family:var(--fd);font-size:20px;font-weight:700}.modal-x{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--sand);color:var(--warm);font-size:14px;cursor:pointer;transition:all .15s}.modal-x:hover{background:var(--rose-fd);color:var(--rose)}.modal-b{padding:20px 24px}.modal-f{padding:16px 24px;border-top:1px solid var(--sand);display:flex;gap:8px;justify-content:flex-end}

// Utils
const clean=n=>n.replace(/\s*\d+\/\d+$/,"").trim();
const sess=n=>{const m=n.match(/(\d+\/\d+)\s*$/);return m?m[1]:null;};
const inits=n=>clean(n).split(" ").filter(Boolean).map(w=>w[0]).join("").toUpperCase().slice(0,2);
const fmtH=h=>h===0?"12 AM":h<12?`${h} AM`:h===12?"12 PM":`${h-12} PM`;
const hue=n=>{let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return Math.abs(h)%360;};
const dateKey=(y,m,d)=>`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const cellKey=(dt,room,hour)=>`${S.tab}|${dt}|${room}|${hour}`;
const findClient=name=>{const q=name.toLowerCase();return S.clientDB.find(c=>c.name.toLowerCase()===q);};
const ensureClient=name=>{let c=findClient(name);if(!c){c={id:Date.now()+Math.random(),name,membership:"",completed:0,total:0,type:S.tab,notes:"",isNew:true,paid:false};S.clientDB.push(c);saveDB();}return c;};
const attKey=(ck,name)=>ck+'||'+clean(name).toLowerCase();
const getAtt=(ck,name)=>S.attendance[attKey(ck,name)]||null;
function toggleAtt(ck,name,st){const k=attKey(ck,name);S.attendance[k]===st?delete S.attendance[k]:S.attendance[k]=st;saveAtt();render();}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function firstDow(y,m){return(new Date(y,m,1).getDay()+6)%7;}
function isToday(y,m,d){const t=new Date();return t.getFullYear()===y&&t.getMonth()===m&&t.getDate()===d;}
function fmtDate(dt){return`${DOWS[(dt.getDay()+6)%7]}, ${dt.getDate()} ${MONTHS[dt.getMonth()]} ${dt.getFullYear()}`;}
function fmtShort(dt){return`${dt.getDate()} ${MONTHS[dt.getMonth()].slice(0,3)}`;}
function countForDate(y,m,d){const dk=dateKey(y,m,d);let c=0;for(const k in S.scheduleData)if(k.startsWith(S.tab+'|'+dk+'|'))c+=S.scheduleData[k].length;return c;}
function roomsForTab(){return ROOM_CFG[S.tab]||ROOM_CFG.pilates;}
function instKey(dt,room,hour){return`${S.tab}|${dt}|${room}|${hour}`;}
function getClientStage(clientId){return S.pipeline[clientId]||"new_lead";}
function setClientStage(clientId,stage){S.pipeline[clientId]=stage;savePipe();render();}
// Reminders key: "day|dateKey|clientName" or "hour|dateKey|clientName"
function remKey(type,dk,name){return`${type}|${dk}|${clean(name).toLowerCase()}`;}
function isRemDone(type,dk,name){return!!S.reminders[remKey(type,dk,name)];}
function toggleRem(type,dk,name){const k=remKey(type,dk,name);S.reminders[k]?delete S.reminders[k]:S.reminders[k]=Date.now();saveRem();render();}

// Week range for overview
function getWeekRange(d){const ti=(d.getDay()+6)%7;const mon=new Date(d);mon.setDate(d.getDate()-ti);mon.setHours(0,0,0,0);const sun=new Date(mon);sun.setDate(mon.getDate()+6);return{start:mon,end:sun};}
function getDaysInRange(s,e){const days=[];const d=new Date(s);while(d<=e){days.push(new Date(d));d.setDate(d.getDate()+1);}return days;}

// Clients scheduled in a date range
function clientsInRange(start,end){
  const set=new Set();const days=getDaysInRange(start,end);
  days.forEach(d=>{const dk=dateKey(d.getFullYear(),d.getMonth(),d.getDate());
    for(const k in S.scheduleData)if(k.includes('|'+dk+'|'))S.scheduleData[k].forEach(n=>set.add(clean(n)));
  });return set;
}

  } else {
    h+=`<div style="text-align:center;padding:10px;color:var(--light);font-size:11px">No clients scheduled</div>`;

}

// ═══ CLIENTS ═══
if(S.page==='clients'){const q=S.cdbSearch.toLowerCase();const fl=q?S.clientDB.filter(c=>c.name.toLowerCase().includes(q)):S.clientDB;
  h+=`<div class="mhdr"><h2 class="mtit">Client Database</h2><div class="mhr"><button class="btn pri" onclick="addClientModal()">+ Add Client</button></div></div><div class="cdb-bar"><div class="cdb-search"><span style="color:var(--light)">🔍</span><input placeholder="Search ${S.clientDB.length} clients…" value="${S.cdbSearch}" oninput="S.cdbSearch=this.value;render()"></div></div><div class="cd"><div class="cdb-count">${fl.length} client${fl.length!==1?'s':''} ${q?'matching "'+S.cdbSearch+'"':''}</div><div class="cdb-list">${fl.map(c=>{const h2=hue(c.name);const ss2=c.total?`${c.completed}/${c.total}`:'';const pct=c.total?Math.round(c.completed/c.total*100):0;const st=CRM_STAGES.find(s=>s.id===getClientStage(c.id));return`<div class="cdb-row"><div class="cdb-av" style="background:hsl(${h2},30%,88%);color:hsl(${h2},28%,38%)">${inits(c.name)}</div><div class="cdb-info"><div class="cdb-name">${c.name}${c.isNew?' <span class="badge am" style="font-size:8px;vertical-align:middle">NEW</span>':''}</div><div class="cdb-meta"><span>${c.type||'pilates'}</span>${isAdmin()&&c.membership?`<span>• ${c.membership}</span>`:''}${ss2?`<span>• ${ss2} (${pct}%)</span>`:''} ${isAdmin()?`<span>• ${c.paid?'<span style="color:var(--grn)">Paid ✓</span>':'<span style="color:var(--red)">Unpaid</span>'}</span>`:''}<span style="font-size:9px;padding:1px 6px;border-radius:4px;background:${st?.bg||'var(--sand)'};color:${st?.color||'var(--warm)'}">${st?.label||'Lead'}</span></div></div><div class="cdb-acts"><div class="cdb-act edit" onclick="editClientModal(${c.id})">✎</div><div class="cdb-act del" onclick="if(confirm('Remove?')){S.clientDB=S.clientDB.filter(x=>x.id!==${c.id});saveDB();render();}">✕</div></div></div>`;}).join('')}</div></div>`;
}

// ═══ INSTRUCTORS ═══
if(S.page==='instructors'){
  h+=`<div class="mhdr"><h2 class="mtit">Instructors</h2><div class="mhr"><div class="tpills"><button class="tp ${S.tab==='pilates'?'on':''}" onclick="S.tab='pilates';render()">Pilates</button><button class="tp ${S.tab==='lagree'?'on':''}" onclick="S.tab='lagree';render()">Lagree</button></div></div></div><div class="inst-grid">${INSTRUCTORS.map(ins=>`<div class="inst-card${S.selInstructor===ins.name?' sel':''}" onclick="S.selInstructor=S.selInstructor==='${ins.name}'?null:'${ins.name}';render()"><div class="inst-ava" style="background:${ins.color};overflow:hidden">${ins.img?`<img src="${ins.img}" >`:ins.name[0]}</div><div class="inst-name">${ins.name}</div></div>`).join('')}</div>`;
  if(S.selInstructor){const daySched=[];HOURS.forEach(hr=>{rooms.forEach(rm=>{const ik=instKey(dk,rm.name,hr);if(S.instructorAssign[ik]===S.selInstructor){const ck=cellKey(dk,rm.name,hr);daySched.push({hour:hr,room:rm.name,clients:S.scheduleData[ck]||[]});}});});
    const ti2=(S.selDate.getDay()+6)%7;const mon2=new Date(S.selDate);mon2.setDate(S.selDate.getDate()-ti2);const weekSch=[];for(let i=0;i<7;i++){const wd=new Date(mon2);wd.setDate(mon2.getDate()+i);const wdk=dateKey(wd.getFullYear(),wd.getMonth(),wd.getDate());let cnt=0;HOURS.forEach(hr=>{rooms.forEach(rm=>{if(S.instructorAssign[`${S.tab}|${wdk}|${rm.name}|${hr}`]===S.selInstructor)cnt++;});});weekSch.push({date:wd,count:cnt});}

    <div class="cd" style="margin-top:14px"><div class="cd-h"><div class="cd-t">${S.selInstructor}'s Week</div></div><div class="cd-b"><div class="ov-week">${weekSch.map(ws=>{const isTd=isToday(ws.date.getFullYear(),ws.date.getMonth(),ws.date.getDate());return`<div class="ov-daycard${isTd?' today':''}" onclick="selDay(${ws.date.getFullYear()},${ws.date.getMonth()},${ws.date.getDate()})"><div class="ov-dh">${DOWS[(ws.date.getDay()+6)%7]}</div><div class="ov-dd">${ws.date.getDate()}</div><div class="ov-dc">${ws.count>0?`<b>${ws.count}</b> slots`:'—'}</div></div>`;}).join('')}</div></div></div>`;
  }
}


// ═══ PROFILES ═══
if(S.page==='profiles'){
  const pfq=S.pfSearch.toLowerCase();

    const pf=S.selProfile;const h2=hue(pf.nm);

    </div></div></div>

    <div class="pf-cards">
      <div class="pf-card"><div class="pf-card-l">Phone</div><div class="pf-card-v" style="font-size:16px">${pf.ph||'—'}</div></div>
      <div class="pf-card"><div class="pf-card-l">Source</div><div class="pf-card-v" style="font-size:16px">${pf.src||'—'}</div></div>
      <div class="pf-card"><div class="pf-card-l">Current Plan</div><div class="pf-card-v" style="font-size:16px">${pf.ct||'—'} ${pf.cs?'('+pf.cs+')':''}</div></div>
      <div class="pf-card"><div class="pf-card-l">Start Date</div><div class="pf-card-v" style="font-size:16px">${pf.csd||'—'}</div></div>
      <div class="pf-card"><div class="pf-card-l">Expiry Date</div><div class="pf-card-v" style="font-size:16px;${isExpired?'color:var(--red)':''}">${pf.ced||'—'}</div></div>
      <div class="pf-card"><div class="pf-card-l">Total Packages</div><div class="pf-card-v">${pf.pk.length}</div></div>
      <div class="pf-card"><div class="pf-card-l">Total Sessions</div><div class="pf-card-v">${pf.at.length}</div></div>
      <div class="pf-card"><div class="pf-card-l">Schedule</div><div class="pf-card-v" style="font-size:14px">${pf.sch||'—'}</div></div>
    </div>

    <div class="cd" style="margin-top:14px"><div class="cd-h"><div class="cd-t">Package History</div></div><div class="cd-b" style="max-height:250px;overflow-y:auto">
    ${pf.pk.map((pk,i)=>`<div class="pf-pkg"><div class="pf-pkg-idx">${i+1}</div><div style="flex:1"><div style="font-weight:600">${pk.t} — ${pk.s} sessions</div><div style="font-size:10px;color:var(--warm)">${pk.sd||'?'} → ${pk.ed||'ongoing'}</div></div></div>`).join('')}
    </div></div>

    <div class="cd" style="margin-top:14px"><div class="cd-h"><div class="cd-t">Attendance Log <span style="font-size:12px;font-weight:400;color:var(--warm)">(${pf.at.length} sessions)</span></div></div><div class="cd-b" style="max-height:300px;overflow-y:auto">
    ${pf.at.length?pf.at.map(a=>`<div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--sand);font-size:12px"><div style="width:90px;color:var(--warm);font-weight:600;flex-shrink:0">${a.d}</div><div>${a.n||'—'}</div></div>`).join(''):'<div style="text-align:center;padding:20px;color:var(--light);font-size:12px">No attendance records</div>'}
    </div></div>`;
  } else {
    // Profile list view
    const allProfiles=CLIENT_PROFILES.filter(p=>!pfq||p.nm.toLowerCase().includes(pfq)||p.ph.toLowerCase().includes(pfq)||p.src.toLowerCase().includes(pfq));
    h+=`<div class="mhdr"><h2 class="mtit">Client Profiles</h2><div class="mhr"><span style="font-size:12px;color:var(--warm)">${CLIENT_PROFILES.length} profiles loaded</span></div></div>
    <div class="cdb-bar"><div class="cdb-search"><span style="color:var(--light)">🔍</span><input placeholder="Search by name, phone, or source…" value="${S.pfSearch}" oninput="S.pfSearch=this.value;render()"></div></div>
    <div class="cd"><div class="cdb-count">${allProfiles.length} profile${allProfiles.length!==1?'s':''}</div><div class="cdb-list" style="max-height:520px;overflow-y:auto">
    ${allProfiles.map(pf=>{
      const h2=hue(pf.nm);const lastPkg=pf.pk[pf.pk.length-1]||{};const isExp=lastPkg.ed&&new Date(lastPkg.ed)<new Date();
      return`<div class="cdb-row" style="cursor:pointer" onclick="S.selProfile=CLIENT_PROFILES.find(p=>p.nm==='${pf.nm.replace(/'/g,"\'")}');render()">
        <div class="cdb-av" style="background:hsl(${h2},30%,88%);color:hsl(${h2},28%,38%)">${inits(pf.nm)}</div>

        <div class="cdb-meta">
          ${pf.ph?`<span>📞 ${pf.ph}</span>`:''}
          ${pf.src?`<span>• 📍 ${pf.src}</span>`:''}
          ${pf.ct?`<span>• ${pf.ct}</span>`:''}
        </div></div>
        <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
          <span style="font-size:10px;padding:2px 8px;border-radius:6px;font-weight:700;background:${isExp?'var(--red-pl);color:var(--red)':'var(--grn-pl);color:var(--grn-dk)'}">${isExp?'Expired':'Active'}</span>
          ${pf.ced?`<span style="font-size:9px;color:var(--light)">exp ${pf.ced}</span>`:''}
        </div></div>`;
    }).join('')}
    </div></div>`;
  }
}

// ═══ RIGHT PANEL ═══
h+=`</main><aside class="rp">`;
if(S.page==='schedule'){
  const dc=[];for(const k in S.scheduleData){if(k.startsWith(S.tab+'|'+dk+'|')){const p=k.split('|');S.scheduleData[k].forEach(n=>dc.push({name:clean(n),room:p[2],hour:parseInt(p[3]),raw:n,ck:k}));}}
  let aC=0,aN=0,aR=0,aP=0;dc.forEach(c=>{const a=getAtt(c.ck,c.raw);if(a==='came')aC++;else if(a==='noshow')aN++;else if(a==='resched')aR++;else aP++;});
  h+=`<div><div class="rp-t">${fmtDate(S.selDate).split(',')[0]}</div>${dc.length?`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap"><div style="font-size:10px;padding:3px 8px;border-radius:6px;background:var(--grn-pl);color:var(--grn-dk);font-weight:600">${aC} came</div><div style="font-size:10px;padding:3px 8px;border-radius:6px;background:var(--red-pl);color:var(--red);font-weight:600">${aN} no-show</div><div style="font-size:10px;padding:3px 8px;border-radius:6px;background:var(--amb-pl);color:var(--amb-dk);font-weight:600">${aR} resched</div><div style="font-size:10px;padding:3px 8px;border-radius:6px;background:var(--sand);color:var(--warm);font-weight:600">${aP} pending</div></div>`:''} ${dc.length?dc.sort((a,b)=>a.hour-b.hour).map(c=>{const db=findClient(c.name);const att=getAtt(c.ck,c.raw);const col=att==='came'?'var(--grn)':att==='noshow'?'var(--red)':att==='resched'?'var(--amb)':'var(--sand-d)';return`<div class="rp-client" onclick="chipClick('${c.raw.replace(/'/g,"\\'")}','${c.ck}')"><div style="width:10px;height:10px;border-radius:50%;background:${col};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600${att==='noshow'?';text-decoration:line-through;opacity:.6':''}">${c.name}</div><div style="font-size:10px;color:var(--warm)">${fmtH(c.hour)} • ${c.room}${db&&db.total?` • ${db.completed}/${db.total}`:''}</div></div>${isAdmin()?`<span style="width:8px;height:8px;border-radius:50%;background:${db&&db.paid?'var(--grn)':'var(--red)'};flex-shrink:0"></span>`:''}</div>`;}).join(''):`<div style="text-align:center;padding:30px;color:var(--light);font-size:12px">No clients scheduled.</div>`}</div>`;
} else {
  h+=`<div><div class="rp-t">Quick Stats</div><div class="rp-it"><div class="rp-dt" style="background:var(--rose)"></div><div><div class="rp-tx">${S.clientDB.length} clients</div><div class="rp-tm">in database</div></div></div><div class="rp-it"><div class="rp-dt" style="background:var(--amb)"></div><div><div class="rp-tx">${S.clientDB.filter(c=>c.isNew).length} new clients</div><div class="rp-tm">Need follow-up</div></div></div>${isAdmin()?`<div class="rp-it"><div class="rp-dt" style="background:var(--grn)"></div><div><div class="rp-tx">${S.clientDB.filter(c=>c.paid).length} paid</div><div class="rp-tm">${S.clientDB.filter(c=>!c.paid&&c.total>0).length} unpaid</div></div></div>`:''}</div>
  <div><div class="rp-t">CRM Snapshot</div>${CRM_STAGES.map(st=>{const cnt=S.clientDB.filter(c=>getClientStage(c.id)===st.id).length;return`<div class="rp-it"><div class="rp-dt" style="background:${st.color}"></div><div><div class="rp-tx">${cnt} ${st.label.toLowerCase()}</div></div></div>`;}).join('')}</div>
  <div><div class="rp-t">Instructors</div>${INSTRUCTORS.map(ins=>`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--sand)"><div class="inst-pill" style="background:${ins.color};width:39px;height:39px;min-width:39px;min-height:39px;font-size:14px;overflow:hidden;position:relative">${ins.img?`<img src="${ins.img}" >`:ins.name[0]}</div><div style="font-size:13px;font-weight:600">${ins.name}</div></div>`).join('')}</div>`;
}
h+=`</aside>`;
document.getElementById("app").innerHTML=h;

// Mobile nav
var mobEl=document.getElementById('mobNav');
if(mobEl){
  var mp=[
    {id:'overview',icon:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',l:'Home'},
    {id:'schedule',icon:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',l:'Schedule'},

    {id:'profiles',icon:'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>',l:'Profiles'},

    return '<button class="mob-tab'+(S.page===p.id?' on':'')+'" onclick="nav(\''+p.id+'\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'+p.icon+'</svg>'+p.l+'</button>';

}
}

// Calendar range picker
window._pickStart=null;
function pickRange(y,m,d){
  const clicked=new Date(y,m,d);
  if(!window._pickStart){window._pickStart=clicked;S.ovRangeStart=clicked;S.ovRangeEnd=clicked;render();}
  else{if(clicked<window._pickStart){S.ovRangeStart=clicked;S.ovRangeEnd=window._pickStart;}else{S.ovRangeStart=window._pickStart;S.ovRangeEnd=clicked;}window._pickStart=null;render();}
}

// FETCH
async function refresh(){S.loading=true;S.err=null;S.errDismissed=false;render();try{const px=u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`;const PIL_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQVlRx2LD5OvLPqV9VbhdhQbPJIT2X6MnDCHdqNJa_UGvdeBSUSLhANMokmOmWa_rxYKcW9yY4GVTM3/pub?output=csv";const LAG_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTO8PiillbuxJkG1denP_zxaDIWKR5ACSGoWAebDIhOW1QdJHWNZeEV4RVJu9ldtcse-6F24-EMA2iL/pub?output=csv";const[pr,lr]=await Promise.all([fetch(px(PIL_URL)),fetch(px(LAG_URL))]);if(!pr.ok||!lr.ok)throw new Error("net");S.liveOk=true;}catch(e){S.err="Could not reach Google Sheets — showing local data.";}S.synced=new Date();S.loading=false;render();}

// INIT
if(S.role){document.getElementById("loginScreen").style.display="none";document.getElementById("app").style.display="grid";render();refresh();}else{showLogin();}
</script></body></html>
